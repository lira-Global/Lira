<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Income Credited - Lira</title>
    <style>
        body {
            font-family: 'Poppins', Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            margin: 0;
            padding: 0;
            background: #f4f4f4;
        }
        .container {
            max-width: 600px;
            margin: 20px auto;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .header {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            padding: 30px 20px;
            text-align: center;
        }
        .header h1 {
            color: white;
            margin: 0;
        }
        .content {
            padding: 30px;
        }
        .amount-box {
            background: #f0f4ff;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            margin: 20px 0;
        }
        .amount {
            font-size: 3rem;
            font-weight: bold;
            color: #667eea;
        }
        .details {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
        }
        .detail-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        .detail-item:last-child {
            border-bottom: none;
        }
        .footer {
            background: #f8f9fa;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Income Credited! 💰</h1>
        </div>
        
        <div class="content">
            <p>Dear <strong>{{name}}</strong>,</p>
            
            <div class="amount-box">
                <div style="color: #666; margin-bottom: 10px;">Amount Credited</div>
                <div class="amount">₹{{amount}}</div>
            </div>
            
            <div class="details">
                <h3>Income Details</h3>
                <div class="detail-item">
                    <span>From:</span>
                    <strong>{{from}}</strong>
                </div>
                <div class="detail-item">
                    <span>Level:</span>
                    <strong>Level {{level}}</strong>
                </div>
                <div class="detail-item">
                    <span>Date:</span>
                    <strong>{{date}}</strong>
                </div>
                <div class="detail-item">
                    <span>Time:</span>
                    <strong>{{time}}</strong>
                </div>
            </div>
            
            <p style="text-align: center;">Keep growing your team to earn more!</p>
        </div>
        
        <div class="footer">
            <p>© {{year}} Lira. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
