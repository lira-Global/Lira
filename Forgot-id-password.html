<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot ID/Password - Lira</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <div class="logo">Lira</div>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/user-login">Login</a>
                <a href="/register">Register</a>
            </div>
        </div>
    </nav>

    <div class="container" style="display: flex; justify-content: center; align-items: center; min-height: calc(100vh - 80px);">
        <div class="glass-card" style="max-width: 400px; width: 100%;">
            <h1 style="text-align: center; margin-bottom: 30px; color: var(--primary);">Recover Account</h1>
            
            <form id="forgotForm" onsubmit="event.preventDefault(); forgotPassword()">
                <div class="form-group">
                    <label class="form-label">Registered Mobile Number</label>
                    <input type="tel" id="mobile" class="form-control" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Registered Email Address</label>
                    <input type="email" id="email" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Recover Account</button>
            </form>

            <div id="result" style="margin-top: 20px; display: none;">
                <div class="alert alert-success">
                    <strong>Your User ID: </strong><span id="userId"></span><br>
                    <strong>Password: </strong><span id="password"></span>
                </div>
            </div>

            <div style="text-align: center; margin-top: 20px;">
                <a href="/user-login" style="color: var(--primary);">Back to Login</a>
            </div>
        </div>
    </div>

    <script>
        async function forgotPassword() {
            const mobile = document.getElementById('mobile').value;
            const email = document.getElementById('email').value;

            try {
                const response = await fetch('/api/forgot', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobile, email })
                });

                const data = await response.json();

                if (data.success) {
                    document.getElementById('userId').textContent = data.userId;
                    document.getElementById('password').textContent = data.password;
                    document.getElementById('result').style.display = 'block';
                } else {
                    showNotification(data.error || 'User not found', 'error');
                }
            } catch (error) {
                showNotification('Request failed', 'error');
            }
        }
    </script>

    <script src="/script.js"></script>
</body>
</html>
