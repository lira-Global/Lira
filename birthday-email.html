<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday - Lira</title>
    <style>
        body {
            font-family: 'Poppins', Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            margin: 0;
            padding: 0;
            background: #f4f4f4;
        }
        .container {
            max-width: 600px;
            margin: 20px auto;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .header {
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            padding: 40px 20px;
            text-align: center;
        }
        .birthday-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        .content {
            padding: 40px 30px;
            text-align: center;
        }
        .special-offer {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 15px;
            padding: 30px;
            margin: 30px 0;
        }
        .coupon {
            background: white;
            color: #667eea;
            font-size: 2rem;
            font-weight: bold;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
        }
        .footer {
            background: #f8f9fa;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="birthday-icon">🎂</div>
            <h1 style="color: white;">Happy Birthday!</h1>
        </div>
        
        <div class="content">
            <h2>Dear {{name}},</h2>
            <p style="font-size: 1.2rem; margin: 20px 0;">Wishing you a day filled with joy and success!</p>
            
            <div class="special-offer">
                <h3>🎁 Special Birthday Gift 🎁</h3>
                <p>Enjoy exclusive benefits on your special day</p>
                <div class="coupon">
                    BDAY{{year}}
                </div>
                <p style="margin-top: 15px;">Get 10% extra on your next purchase</p>
            </div>
            
            <p>Thank you for being a valued member of Lira family.</p>
        </div>
        
        <div class="footer">
            <p>© {{year}} Lira. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
