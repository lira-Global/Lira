<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Lira</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">Lira</div>
        <div class="nav-links">
            <a href="/index.html">Home</a>
            <a href="/dashboard.html">Dashboard</a>
            <a href="/products.html">Products</a>
            <a href="/wallet.html">Wallet</a>
            <a href="/profile.html">Profile</a>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>
    </nav>
    
    <div class="container">
        <div class="row">
            <div class="col">
                <div class="card">
                    <h1 class="card-title">Profile Information</h1>
                    
                    <div class="form-group">
                        <label>User ID</label>
                        <input type="text" id="userId" class="form-control" readonly>
                    </div>
                    
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="username" class="form-control" readonly>
                    </div>
                    
                    <div class="form-group">
                        <label>Mobile Number</label>
                        <input type="text" id="mobile" class="form-control" readonly>
                    </div>
                    
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="email" class="form-control" readonly>
                    </div>
                    
                    <div class="form-group">
                        <label>Sponsor ID</label>
                        <input type="text" id="sponsorId" class="form-control" readonly>
                    </div>
                    
                    <div class="form-group">
                        <label>Position</label>
                        <input type="text" id="position" class="form-control" readonly>
                    </div>
                </div>
            </div>
            
            <div class="col">
                <div class="card">
                    <h2 class="card-title">Additional Information</h2>
                    
                    <form id="profileForm">
                        <div class="form-group">
                            <label for="birthdate">Birth Date</label>
                            <input type="date" id="birthdate" name="birthdate" class="form-control">
                        </div>
                        
                        <div class="form-group">
                            <label for="anniversary">Anniversary Date</label>
                            <input type="date" id="anniversary" name="anniversary" class="form-control">
                        </div>
                        
                        <button type="submit" class="btn btn-primary">Update Profile</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
    <footer class="footer">
        <p>&copy; 2024 Lira. All rights reserved.</p>
    </footer>
    
    <script src="/script.js"></script>
    <script>
        async function loadProfile() {
            try {
                const user = await API.get('/api/user');
                document.getElementById('userId').value = user.userId;
                document.getElementById('username').value = user.username;
                document.getElementById('mobile').value = user.mobile;
                document.getElementById('email').value = user.email;
                document.getElementById('sponsorId').value = user.sponsorId;
                document.getElementById('position').value = `Leg ${user.position || 'N/A'}`;
            } catch (error) {
                console.error('Failed to load profile:', error);
            }
        }
        
        document.addEventListener('DOMContentLoaded', loadProfile);
    </script>
</body>
</html>
