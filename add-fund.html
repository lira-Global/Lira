<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Fund - Lira</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">Lira</div>
        <div class="nav-links">
            <a href="/index.html">Home</a>
            <a href="/dashboard.html">Dashboard</a>
            <a href="/products.html">Products</a>
            <a href="/wallet.html">Wallet</a>
            <a href="/profile.html">Profile</a>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>
    </nav>
    
    <div class="container">
        <div class="row">
            <div class="col">
                <div class="card">
                    <h1 class="card-title">Add Fund to Wallet</h1>
                    
                    <div id="company-details">
                        <!-- Company details will be loaded here -->
                    </div>
                    
                    <form id="addFundForm" enctype="multipart/form-data">
                        <div class="form-group">
                            <label for="name">Name as per Bank</label>
                            <input type="text" id="name" name="name" class="form-control" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="amount">Amount (₹)</label>
                            <input type="number" id="amount" name="amount" class="form-control" min="1" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="utr">UTR Number</label>
                            <input type="text" id="utr" name="utr" class="form-control" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="screenshot">Payment Screenshot</label>
                            <div class="upload-area" onclick="document.getElementById('screenshot').click()">
                                <div class="upload-icon">📎</div>
                                <p>Click to upload or drag and drop</p>
                                <p style="font-size:0.8rem; color:#999;">PNG, JPG, JPEG (Max 50MB)</p>
                            </div>
                            <input type="file" id="screenshot" name="screenshot" style="display:none;" accept="image/*">
                        </div>
                        
                        <div class="form-group">
                            <label for="description">Description (Optional)</label>
                            <textarea id="description" name="description" class="form-control" rows="3"></textarea>
                        </div>
                        
                        <button type="submit" class="btn btn-primary btn-block">Submit Request</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
    <footer class="footer">
        <p>&copy; 2024 Lira. All rights reserved.</p>
    </footer>
    
    <script src="/script.js"></script>
</body>
</html>
