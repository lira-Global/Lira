<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Lira</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <div class="logo">Lira</div>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/products">Products</a>
                <a href="/user-login" class="active">Login</a>
                <a href="/register">Register</a>
            </div>
        </div>
    </nav>

    <div class="container" style="display: flex; justify-content: center; align-items: center; min-height: calc(100vh - 80px);">
        <div class="glass-card" style="max-width: 400px; width: 100%;">
            <h1 style="text-align: center; margin-bottom: 30px; color: var(--primary);">Welcome Back</h1>
            
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">User ID (Mobile Number)</label>
                    <input type="text" id="userId" class="form-control" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
            </form>

            <div style="text-align: center; margin-top: 20px;">
                <a href="/forgot-id-password" style="color: var(--gray);">Forgot ID or Password?</a>
            </div>

            <div style="text-align: center; margin-top: 15px;">
                New to Lira? <a href="/register" style="color: var(--primary);">Create Account</a>
            </div>
        </div>
    </div>

    <script src="/script.js"></script>
</body>
</html>
