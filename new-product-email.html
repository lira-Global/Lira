<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Product Alert - Lira</title>
    <style>
        body {
            font-family: 'Poppins', Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            margin: 0;
            padding: 0;
            background: #f4f4f4;
        }
        .container {
            max-width: 600px;
            margin: 20px auto;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px 20px;
            text-align: center;
        }
        .header h1 {
            color: white;
            margin: 0;
        }
        .product-image {
            width: 100%;
            max-height: 300px;
            object-fit: cover;
        }
        .content {
            padding: 30px;
        }
        .product-details {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
        }
        .price {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
            text-align: center;
            margin: 20px 0;
        }
        .button {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
        }
        .footer {
            background: #f8f9fa;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✨ New Product Alert ✨</h1>
        </div>
        
        <img src="{{productImage}}" alt="{{productName}}" class="product-image">
        
        <div class="content">
            <h2 style="text-align: center;">{{productName}}</h2>
            
            <div class="product-details">
                <h3>Product Highlights</h3>
                <p>{{description}}</p>
                <div class="price">
                    {{price}}
                </div>
            </div>
            
            <div style="text-align: center;">
                <p>Be the first to own this amazing product!</p>
                <a href="{{siteUrl}}/products.html" class="button">Shop Now</a>
            </div>
        </div>
        
        <div class="footer">
            <p>© {{year}} Lira. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
