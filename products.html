<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Lira</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <div class="logo">Lira</div>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/products" class="active">Products</a>
                <a href="/user-login">Login</a>
                <a href="/register">Register</a>
                <a href="/purchase">Cart <span id="cartCount" class="badge badge-primary" style="display: none;">0</span></a>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1 class="section-title">Our Premium Collection</h1>
        
        <div style="margin-bottom: 30px;">
            <select class="form-control" style="width: 200px;" onchange="filterProducts(this.value)">
                <option value="">All Categories</option>
                <option value="Gold">Gold</option>
                <option value="Silver">Silver</option>
                <option value="Diamond">Diamond</option>
                <option value="Platinum">Platinum</option>
                <option value="kid wear">Kid Wear</option>
                <option value="men's wear">Men's Wear</option>
                <option value="women's wear">Women's Wear</option>
                <option value="Electronics">Electronics</option>
            </select>
        </div>

        <div id="products-container" class="product-grid"></div>
    </div>

    <script>
        function filterProducts(category) {
            // Filter products by category
            const products = document.querySelectorAll('.product-card');
            products.forEach(product => {
                if (!category || product.dataset.category === category) {
                    product.style.display = 'block';
                } else {
                    product.style.display = 'none';
                }
            });
        }
    </script>
    <script src="/script.js"></script>
</body>
</html>
