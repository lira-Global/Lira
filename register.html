<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Lira</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
        .register-container {
            min-height: calc(100vh - 200px);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .register-card {
            background: white;
            border-radius: 20px;
            padding: 3rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
        }
        
        .register-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .register-header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        
        .register-header p {
            color: #666;
        }
        
        .otp-group {
            display: flex;
            gap: 0.5rem;
        }
        
        .otp-group .form-control {
            flex: 1;
        }
        
        .otp-group .btn {
            width: 100px;
        }
        
        .register-footer {
            text-align: center;
            margin-top: 2rem;
            color: #666;
        }
        
        .register-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        
        .info-box {
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            color: #333;
        }
        
        .info-box strong {
            color: #667eea;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">Lira</div>
        <div class="nav-links">
            <a href="/index.html">Home</a>
            <a href="/products.html">Products</a>
            <a href="/login.html" class="btn-login">Login</a>
            <a href="/register.html" class="btn-register">Register</a>
        </div>
    </nav>
    
    <div class="container register-container">
        <div class="register-card">
            <div class="register-header">
                <h1>Join Lira Family</h1>
                <p>Create your account and start your journey</p>
            </div>
            
            <div class="info-box">
                <strong>Note:</strong> Your User ID will be your mobile number and password will also be your mobile number. Please keep it safe.
            </div>
            
            <form id="registerForm">
                <div class="form-group">
                    <label for="sponsorId">Sponsor ID</label>
                    <input type="text" id="sponsorId" name="sponsorId" class="form-control" placeholder="Enter sponsor ID" required>
                </div>
                
                <div class="form-group">
                    <label for="username">Full Name</label>
                    <input type="text" id="username" name="username" class="form-control" placeholder="Enter your full name" required>
                </div>
                
                <div class="form-group">
                    <label for="mobile">Mobile Number</label>
                    <input type="tel" id="mobile" name="mobile" class="form-control" placeholder="Enter 10 digit mobile number" pattern="[0-9]{10}" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="otp-group">
                        <input type="email" id="email" name="email" class="form-control" placeholder="Enter your email" required>
                        <button type="button" id="sendOtp" class="btn btn-secondary">Send OTP</button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="otp">OTP Verification</label>
                    <div class="otp-group">
                        <input type="text" id="otp" class="form-control" placeholder="Enter OTP">
                        <button type="button" id="verifyOtp" class="btn btn-primary">Verify</button>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">Register</button>
            </form>
            
            <div class="register-footer">
                <p>Already have an account? <a href="/login.html">Login here</a></p>
            </div>
        </div>
    </div>
    
    <footer class="footer">
        <p>&copy; 2024 Lira. All rights reserved.</p>
    </footer>
    
    <script src="/script.js"></script>
</body>
</html>
