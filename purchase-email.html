<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase Confirmation - Lira</title>
    <style>
        body {
            font-family: 'Poppins', Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            margin: 0;
            padding: 0;
            background: #f4f4f4;
        }
        .container {
            max-width: 600px;
            margin: 20px auto;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px 20px;
            text-align: center;
        }
        .header h1 {
            color: white;
            margin: 0;
        }
        .content {
            padding: 30px;
        }
        .success-icon {
            text-align: center;
            font-size: 4rem;
            margin-bottom: 20px;
        }
        .order-details {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
        }
        .product-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        .total {
            font-size: 1.2rem;
            font-weight: bold;
            color: #667eea;
            text-align: right;
            margin-top: 15px;
        }
        .button {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
        }
        .footer {
            background: #f8f9fa;
            padding: 20px;
            text-align: center;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Purchase Successful! 🎉</h1>
        </div>
        
        <div class="content">
            <div class="success-icon">✅</div>
            
            <h2 style="text-align: center;">Thank You for Your Purchase!</h2>
            
            <p>Dear <strong>{{name}}</strong>,</p>
            
            <p>Your order has been successfully placed and will be processed shortly.</p>
            
            <div class="order-details">
                <h3>Order Summary</h3>
                <div class="product-item">
                    <span>Order ID:</span>
                    <strong>{{orderId}}</strong>
                </div>
                <div class="product-item">
                    <span>Date:</span>
                    <strong>{{date}}</strong>
                </div>
                {{items}}
                <div class="total">
                    Total Amount: {{total}}
                </div>
            </div>
            
            <div style="text-align: center;">
                <a href="{{siteUrl}}/dashboard.html" class="button">Track Your Order</a>
            </div>
        </div>
        
        <div class="footer">
            <p>© {{year}} Lira. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
